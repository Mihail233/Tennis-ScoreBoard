<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <title>Tennis ScoreBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="./js/script.js" defer></script>
</head>

<body style="background-color:#000000;">

</body>
<main>
    <div class="mainBlock centered">
        <div class="startedMenu borderSetting toxicText">
            <div class="menuHeader centered">
                <h2>NEW MATCH</h2>
            </div>
            <div class="menuForm">
                <form id="startedForm">
                    <div class ="centered">
                        <label for="player1_name">Player1 name</label>
                        <input type="text" id="player1_name" name = "playerOneName" class="interactionFormElement borderSetting toxicText" required>
                    </div>
                    <div class ="centered">
                        <label for="player2_name">Player2 name</label>
                        <input type="text" id="player2_name" name = "playerTwoName" class="interactionFormElement borderSetting toxicText" required>
                    </div>
                    <div class ="centered">
                        <button id="startButton" type="submit" class="interactionFormElement borderSetting toxicText">START</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</html>
